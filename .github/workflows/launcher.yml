name: Build Launcher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDK via Chocolatey
        shell: pwsh
        run: |
          choco install dotnet-8.0-sdk -y

      - name: Build
        run: |
          cd Launcher
          dotnet build -c Release

      - name: Publish
        run: |
          cd Launcher
          dotnet publish CypressLauncher.csproj -c Release -f net8.0-windows -r win-x64 --self-contained false -o build

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: Launcher
          path: Launcher/build
