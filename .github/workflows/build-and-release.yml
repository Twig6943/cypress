name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  server:
    runs-on: windows-latest
    strategy:
      matrix:
        game: [GW1, GW2, BFN]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Server - ${{ matrix.game }}
      working-directory: Server
      run: msbuild GW2ServerProject.vcxproj "/p:Configuration=Release - ${{ matrix.game }}" /p:Platform=x64 /m

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: cypress_${{ matrix.game }}
        path: Server/x64/Release - ${{ matrix.game }}/cypress_${{ matrix.game }}.dll

  launcher:
    needs: server
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Download server DLLs
      uses: actions/download-artifact@v4
      with:
        path: publish/CypressLauncher
        merge-multiple: true

    - name: Build CypressLauncher
      shell: pwsh
      run: dotnet publish Launcher/CypressLauncher.csproj -c Release -f net8.0-windows -o publish/CypressLauncher /p:LangVersion=latest

    - name: Stage release artifacts
      shell: pwsh
      run: |
        $stage = "publish/CypressLauncher"
        Copy-Item "Launcher/courgette.exe" $stage -ErrorAction SilentlyContinue
        Copy-Item "Launcher/GW2.patch" $stage
        Copy-Item "Launcher/BFN.Patch" $stage
        if (Test-Path "Launcher/Docs") {
          Copy-Item "Launcher/Docs" "$stage/README" -Recurse
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Cypress
        path: publish/CypressLauncher

    - name: Create release archive
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        Compress-Archive -Path "publish/CypressLauncher/*" -DestinationPath "Cypress-$tag.zip"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Cypress-*.zip
        generate_release_notes: true
        draft: false
        prerelease: false
